name: gateway
on:
  pull_request:
    paths: ['src/gateway/**']
  push:
    branches: [main]
    paths: ['src/gateway/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build src/gateway -c Release