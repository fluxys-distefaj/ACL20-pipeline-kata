name: deploy-backend
on:
  push:
    branches: [main]
    paths: ['src/backend/**', 'charts/backend/**', '.github/workflows/deploy-backend.yml']
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment:
      name: production-backend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # nbgv needs the FULL history to compute git height

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version (nbgv)
        id: ver
        run: |
          dotnet tool restore
          echo "tag=$(dotnet nbgv get-version -p src/backend -v NuGetPackageVersion)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/backend:${{ steps.ver.outputs.tag }}

      - uses: azure/setup-helm@v4

      - name: Fetch kubeconfig from Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: nl-ams
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          scw k8s kubeconfig install ${{ secrets.SCW_CLUSTER_ID }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install backend ./charts/backend \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/backend \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --wait --timeout 3m