name: client
on:
  pull_request:
    paths: ['src/client/**']
  push:
    branches: [main]
    paths: ['src/client/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build src/client -c Release